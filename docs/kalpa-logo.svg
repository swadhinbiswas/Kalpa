<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="cyc1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyc2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="folder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle (cosmic cycle) -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#cyc2)" stroke-width="32"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#cyc1)" stroke-width="6"
          stroke-dasharray="10 12" stroke-linecap="round" opacity="0.6"/>

  <!-- Folde icon inside circle -->
  <g transform="translate(128, 168)" filter="url(#shadow)">
    <!-- Folder back -->
    <path d="M0 20 Q0 8 12 8 L20 8 L28 20 L28 56 Q28 64 20 64 L12 64 Q0 64 0 56 Z"
          fill="#a5b4fc" opacity="0.8"/>
    <!-- Folder front -->
    <path d="M4 20 L56 20 Q64 20 64 28 L64 60 Q64 68 56 68 L8 68 Q4 68 4 64 Z"
          fill="url(#folder)"/>
    <!-- Paper lines -->
    <line x1="16" y1="36" x2="52" y2="36" stroke="#e0e7ff" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="44" x2="48" y2="44" stroke="#e0e7ff" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="52" x2="44" y2="52" stroke="#e0e7ff" stroke-width="2" stroke-linecap="round"/>
    <!-- Clock hands overlay -->
    <circle cx="34" cy="44" r="18" fill="none" stroke="#c7d2fe" stroke-width="1.5" opacity="0.4"/>
    <line x1="34" y1="44" x2="34" y2="32" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="34" y1="44" x2="42" y2="44" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Orbit dots (planets) around the cycle -->
  <circle cx="200" cy="55" r="6" fill="#818cf8" opacity="0.7"/>
  <circle cx="340" cy="160" r="5" fill="#06b6d4" opacity="0.6"/>
  <circle cx="100" cy="300" r="4" fill="#a5b4fc" opacity="0.5"/>

  <!-- Kalpa text -->
  <g transform="translate(400, 130)">
    <text x="0" y="60" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
          font-size="72" font-weight="700" fill="#e2e8f0" letter-spacing="2">
      kalpa
    </text>
    <text x="4" y="100" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
          font-size="16" fill="#94a3b8" letter-spacing="4" font-weight="400">
      TIME MOVES IN CYCLES
    </text>
  </g>

  <!-- Subtitle -->
  <text x="400" y="310" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
        font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="2">
    LOCAL-FIRST FILESYSTEM TIMELINE ENGINE
  </text>

  <!-- Decorative line -->
  <line x1="400" y1="330" x2="400" y2="345" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  <line x1="340" y1="337" x2="460" y2="337" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <!-- Small version badge -->
  <rect x="482" y="114" width="56" height="22" rx="11" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
  <text x="510" y="129" font-family="ui-monospace, monospace" font-size="11"
        fill="#818cf8" text-anchor="middle" font-weight="600">v0.1</text>
</svg>
