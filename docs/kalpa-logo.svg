<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8" />
      <stop offset="100%" style="stop-color:#06b6d4" />
    </linearGradient>
    <linearGradient id="folder-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#818cf8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Folder icon -->
  <g transform="translate(40, 52)" filter="url(#glow)">
    <!-- Folder back tab -->
    <path d="M0 16 Q0 6 10 6 L18 6 L25 16 L25 48 Q25 54 19 54 L11 54 Q0 54 0 46 Z"
          fill="#818cf8" opacity="0.6"/>
    <!-- Folder front body -->
    <path d="M3 16 L48 16 Q54 16 54 22 L54 48 Q54 54 48 54 L6 54 Q3 54 3 50 Z"
          fill="url(#folder-grad)"/>
    <!-- Circular arrow (time/undo) overlay -->
    <circle cx="28" cy="35" r="14" fill="none" stroke="#c7d2fe" stroke-width="2" opacity="0.7"/>
    <path d="M28 21 L28 25 M28 45 L28 41 M42 35 L38 35" fill="none"
          stroke="#e0e7ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M35 23 A14 14 0 0 1 38 35" fill="none"
          stroke="#e0e7ff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <!-- Arrow tip on the circular arrow -->
    <polygon points="38,31 42,35 37,36" fill="#e0e7ff" opacity="0.8"/>
  </g>

  <!-- Vertical separator -->
  <line x1="128" y1="60" x2="128" y2="140" stroke="#334155" stroke-width="1" opacity="0.6"/>

  <!-- kalpa wordmark -->
  <text x="148" y="118" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', monospace"
        font-size="64" font-weight="700" fill="url(#grad)" letter-spacing="3">
    kalpa
  </text>

  <!-- Tagline -->
  <text x="150" y="145" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
        font-size="13" fill="#64748b" letter-spacing="3">
    FILESYSTEM TIMELINE ENGINE
  </text>
</svg>
