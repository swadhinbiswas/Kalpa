<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480">
  <defs>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .line {
        opacity: 0;
        animation: fadeIn 0.3s ease-out forwards;
      }
      /* Terminal window */
      .l0  { animation-delay: 0.2s; }
      /* Watch command + output */
      .l1  { animation-delay: 0.4s; }
      .l2  { animation-delay: 1.2s; }
      .l3  { animation-delay: 1.6s; }
      .l4  { animation-delay: 2.0s; }
      .l5  { animation-delay: 2.4s; }
      /* Pause, then rm -rf */
      .l6  { animation-delay: 3.4s; }
      .l7  { animation-delay: 3.8s; }
      /* kalpa undo */
      .l8  { animation-delay: 4.8s; }
      .l9  { animation-delay: 5.4s; }
      .l10 { animation-delay: 5.9s; }
      .l11 { animation-delay: 6.3s; }
      /* kalpa timeline */
      .l12 { animation-delay: 7.4s; }
      .l13 { animation-delay: 8.0s; }
      .l14 { animation-delay: 8.4s; }
      .l15 { animation-delay: 8.7s; }
      .l16 { animation-delay: 9.0s; }
      .l17 { animation-delay: 9.3s; }
      .l18 { animation-delay: 9.6s; }
      .l19 { animation-delay: 9.9s; }
      .l20 { animation-delay: 10.2s; }
      .l21 { animation-delay: 10.5s; }
      .cursor {
        opacity: 0;
        animation: fadeIn 0.3s ease-out 11s forwards, blink 1s step-end 11.3s infinite;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="480" rx="12" fill="#0d1117"/>

  <!-- Terminal window chrome -->
  <rect width="720" height="480" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect y="0" width="720" height="38" rx="12" fill="#21262d"/>
  <rect y="26" width="720" height="12" fill="#21262d"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#f85149" opacity="0.9"/>
  <circle cx="40" cy="19" r="6" fill="#d29922" opacity="0.9"/>
  <circle cx="60" cy="19" r="6" fill="#3fb950" opacity="0.9"/>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Consolas, monospace"
        font-size="12" fill="#8b949e">kalpa</text>

  <!-- Terminal content area -->
  <g font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace" font-size="13.5">

    <!-- Line 1: kalpa watch command -->
    <text class="line l1" x="20" y="68">
      <tspan fill="#7ee787">$</tspan>
      <tspan fill="#e6edf3"> kalpa watch ./my-project --background</tspan>
    </text>

    <!-- Line 2: watcher start output -->
    <text class="line l2" x="20" y="90">
      <tspan fill="#3fb950">+</tspan>
      <tspan fill="#e6edf3"> Watching </tspan>
      <tspan fill="#79c0ff">/home/user/my-project</tspan>
      <tspan fill="#e6edf3"> — timeline started.</tspan>
    </text>

    <!-- Line 3: .kalpa created -->
    <text class="line l3" x="20" y="110">
      <tspan fill="#8b949e">  .kalpa/ created at </tspan>
      <tspan fill="#79c0ff">/home/user/my-project/.kalpa</tspan>
    </text>

    <!-- Line 4: folder ID -->
    <text class="line l4" x="20" y="130">
      <tspan fill="#8b949e">  Folder ID: </tspan>
      <tspan fill="#d2a8ff">a3f7c2e1-9b4d-4f8a-b6e2-1c5d8a3f7e90</tspan>
    </text>

    <!-- Line 5: background PID -->
    <text class="line l5" x="20" y="150">
      <tspan fill="#8b949e">  Background watcher PID: </tspan>
      <tspan fill="#79c0ff">41827</tspan>
    </text>

    <!-- Line 6: rm -rf (the oh-no moment) -->
    <text class="line l6" x="20" y="185">
      <tspan fill="#7ee787">$</tspan>
      <tspan fill="#e6edf3"> rm -rf src/</tspan>
    </text>

    <!-- Line 7: dramatic comment -->
    <text class="line l7" x="20" y="205">
      <tspan fill="#f85149">  # accidentally deleted 3 files...</tspan>
    </text>

    <!-- Line 8: kalpa undo command -->
    <text class="line l8" x="20" y="240">
      <tspan fill="#7ee787">$</tspan>
      <tspan fill="#e6edf3"> kalpa undo</tspan>
    </text>

    <!-- Line 9: restore output -->
    <text class="line l9" x="20" y="260">
      <tspan fill="#3fb950">Restored</tspan>
      <tspan fill="#79c0ff"> 3 </tspan>
      <tspan fill="#e6edf3">files</tspan>
      <tspan fill="#8b949e"> (</tspan>
      <tspan fill="#79c0ff">2.4 KB</tspan>
      <tspan fill="#8b949e">)</tspan>
    </text>

    <!-- Line 10: restored files list -->
    <text class="line l10" x="20" y="280">
      <tspan fill="#8b949e">  </tspan>
      <tspan fill="#3fb950">&lt;-</tspan>
      <tspan fill="#e6edf3"> src/auth.py</tspan>
    </text>
    <text class="line l11" x="20" y="298">
      <tspan fill="#8b949e">  </tspan>
      <tspan fill="#3fb950">&lt;-</tspan>
      <tspan fill="#e6edf3"> src/main.py</tspan>
    </text>

    <!-- Line 12: kalpa timeline command -->
    <text class="line l12" x="20" y="333">
      <tspan fill="#7ee787">$</tspan>
      <tspan fill="#e6edf3"> kalpa timeline</tspan>
    </text>

    <!-- Timeline header -->
    <text class="line l13" x="20" y="355">
      <tspan fill="#79c0ff">Timeline</tspan>
      <tspan fill="#30363d"> ──────────────────────────────────────────────</tspan>
    </text>

    <!-- Timeline event 1: create -->
    <text class="line l14" x="20" y="375">
      <tspan fill="#3fb950">+</tspan>
      <tspan fill="#8b949e"> 14:32:01</tspan>
      <tspan fill="#3fb950"> create </tspan>
      <tspan fill="#e6edf3">src/auth.py</tspan>
      <tspan fill="#8b949e">        [842B]</tspan>
    </text>

    <!-- Timeline event 2: modify -->
    <text class="line l15" x="20" y="393">
      <tspan fill="#d29922">~</tspan>
      <tspan fill="#8b949e"> 14:32:03</tspan>
      <tspan fill="#d29922"> modify </tspan>
      <tspan fill="#e6edf3">src/main.py</tspan>
      <tspan fill="#8b949e">       [1.2K]</tspan>
    </text>

    <!-- Timeline event 3: delete -->
    <text class="line l16" x="20" y="411">
      <tspan fill="#f85149">-</tspan>
      <tspan fill="#8b949e"> 14:32:15</tspan>
      <tspan fill="#f85149"> delete </tspan>
      <tspan fill="#e6edf3">src/</tspan>
      <tspan fill="#8b949e">               [3 files]</tspan>
    </text>

    <!-- Timeline event 4: restore -->
    <text class="line l17" x="20" y="429">
      <tspan fill="#3fb950">+</tspan>
      <tspan fill="#8b949e"> 14:32:18</tspan>
      <tspan fill="#3fb950"> restore</tspan>
      <tspan fill="#e6edf3"> src/</tspan>
      <tspan fill="#8b949e">             [3 files, 2.4K]</tspan>
    </text>

    <!-- Footer: event count -->
    <text class="line l18" x="20" y="455">
      <tspan fill="#8b949e">Showing </tspan>
      <tspan fill="#79c0ff">4</tspan>
      <tspan fill="#8b949e"> of </tspan>
      <tspan fill="#79c0ff">4</tspan>
      <tspan fill="#8b949e"> events</tspan>
    </text>

    <!-- Cursor -->
    <text class="cursor" x="20" y="475">
      <tspan fill="#7ee787">$</tspan>
      <tspan fill="#e6edf3"> </tspan>
    </text>

  </g>
</svg>
